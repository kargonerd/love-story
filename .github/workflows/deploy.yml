name: Deploy Love Story

on:
  push:
    tags:
      - "love-story-v*"
  workflow_dispatch:
    inputs:
      environment:
        description: EdgeOne Makers deployment environment
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production
      verify_base_url:
        description: Optional deployed URL to verify
        required: false
        type: string

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}
      EDGEONE_PROJECT_NAME: ${{ vars.EDGEONE_PROJECT_NAME || 'jojo-love-story' }}
      EDGEONE_DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22.14.0
      - name: Verify static site
        run: node scripts/verify-site.mjs
      - name: Prepare deployment
        run: |
          mkdir .edgeone-dist
          cp index.html favicon.ico .edgeone-dist/
          cp -R css fonts img js music .edgeone-dist/
          sed -i "s#</head>#<meta name=\"deployment-revision\" content=\"${GITHUB_SHA}\">\\n</head>#" .edgeone-dist/index.html
      - name: Deploy to EdgeOne Makers
        run: |
          test -n "$EDGEONE_API_TOKEN" || (echo "EDGEONE_API_TOKEN is not configured" >&2 && exit 1)
          npx --yes edgeone@1.6.14 makers deploy ./.edgeone-dist \
            --name "$EDGEONE_PROJECT_NAME" \
            --token "$EDGEONE_API_TOKEN" \
            --env "$EDGEONE_DEPLOY_ENV"
      - name: Verify deployed assets
        if: ${{ (inputs.verify_base_url || vars.EDGEONE_LOVE_STORY_BASE_URL) != '' }}
        env:
          LOVE_STORY_BASE_URL: ${{ inputs.verify_base_url || vars.EDGEONE_LOVE_STORY_BASE_URL }}
          LOVE_STORY_DEPLOY_REVISION: ${{ github.sha }}
        run: node scripts/verify-deployment.mjs
      - name: Report deferred verification
        if: ${{ (inputs.verify_base_url || vars.EDGEONE_LOVE_STORY_BASE_URL) == '' }}
        run: echo "::notice::Deployment uploaded. Set EDGEONE_LOVE_STORY_BASE_URL after the custom domain is active."
